name: Demo CI (Repo sanity)

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sanity:
    name: Repo sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Basic structure checks
        shell: bash
        run: |
          set -euo pipefail

          echo "== Basic checks =="
          test -f README.md || (echo "README.md missing" && exit 1)
          test -d .github/workflows || (echo ".github/workflows missing" && exit 1)

          echo "Structure looks good."

          echo ""
          echo "== Repo summary =="
          echo "Actor: $GITHUB_ACTOR"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref:   $GITHUB_REF"
          echo "SHA:   $GITHUB_SHA"
          echo ""

          # Create a small report file (for artifact demo)
          mkdir -p output
          {
            echo "Repo sanity report"
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Actor: $GITHUB_ACTOR"
            echo "Event: $GITHUB_EVENT_NAME"
            echo "Ref: $GITHUB_REF"
            echo "SHA: $GITHUB_SHA"
            echo ""
            echo "Top-level files:"
            ls -la
          } > output/sanity-report.txt

      - name: Upload sanity report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanity-report
          path: output/sanity-report.txt
          retention-days: 7
